services:
  - type: web
    name: grocer-dash-hub
    runtime: node
    rootDir: .
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: NODE_ENV=production node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production

  - type: static
    name: grocer-dash-hub-frontend
    rootDir: .
    buildCommand: pnpm install && BASE_PATH=/ VITE_API_URL=https://grocer-dash-hub.onrender.com VITE_SUPABASE_URL=https://qlawqfpjaopsgmnavhgx.supabase.co VITE_SUPABASE_PUBLISHABLE_KEY=sb_publishable_2Q99fKIJZG02sP100IIcvg_t4Bmn6iw pnpm --filter @workspace/freshcart run build
    staticPublishPath: ./artifacts/freshcart/dist/public
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: VITE_API_URL
        value: https://grocer-dash-hub.onrender.com
      - key: VITE_SUPABASE_URL
        value: https://qlawqfpjaopsgmnavhgx.supabase.co
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        value: sb_publishable_2Q99fKIJZG02sP100IIcvg_t4Bmn6iw
