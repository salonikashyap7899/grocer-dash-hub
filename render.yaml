services:
  - type: web
    name: grocer-dash-hub-api
    runtime: node
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: static
    name: grocer-dash-hub-frontend
    buildCommand: pnpm install && pnpm --filter @workspace/freshcart run build
    staticPublishPath: ./artifacts/freshcart/dist
    envVars:
      - key: NODE_ENV
        value: production
